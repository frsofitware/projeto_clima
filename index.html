<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Clima - Previsão do Tempo</title>
    <link rel="stylesheet" href='./assets/css/style.css'>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    <div class="container">
        <header>
            <span class="header-emoji">🌤️</span>
            <h1>Como está <br> <span class="serif-inline">o tempo</span> por aí hoje?</h1>
            <p>Condições meteorológicas em tempo real para qualquer cidade do mundo</p>
        </header>

        <main>
            <section id="searchBox" class="search-box">
                <input type="text" id="cityInput" placeholder="Digite o nome da cidade..." aria-label="Nome da cidade">
                <button id="searchBtn">Buscar</button>
            </section>

            <section id="weatherResult" class="weather-result hidden">
                <div class="weather-actions">
                    <button id="backBtn" class="back-btn">← Voltar</button>
                </div>
                
                <div class="bento-grid">
                    <!-- Main Card -->
                    <div class="bento-item main-card">
                        <div class="main-card-row">
                            <div id="mainIcon" class="main-weather-icon"></div>
                            <div class="main-temp">
                                <span id="tempValue">--</span><span class="unit-large">°C</span>
                            </div>
                            <div class="main-location-info">
                                <h2 id="displayName">Cidade</h2>
                                <p id="descValue" class="weather-desc">Condição</p>
                            </div>
                        </div>
                    </div>

                    <!-- Detail Cards -->
                    <div class="bento-item detail-card">
                        <div class="detail-icon">🌡️</div>
                        <div class="detail-info">
                            <span class="label">Sensação</span>
                            <span class="value"><span id="feelsLikeValue">--</span>°C</span>
                        </div>
                    </div>

                    <div class="bento-item detail-card">
                        <div class="detail-icon">💧</div>
                        <div class="detail-info">
                            <span class="label">Humidade</span>
                            <span class="value"><span id="humidityValue">--</span>%</span>
                        </div>
                    </div>
                    
                    <div class="bento-item detail-card">
                        <div class="detail-icon">💨</div>
                        <div class="detail-info">
                            <span class="label">Vento</span>
                            <span class="value"><span id="windValue">--</span> <small>km/h</small></span>
                        </div>
                    </div>
                </div>
            </section>

            <div id="loading" class="loading hidden">Buscando informações...</div>
            <div id="errorWrapper" class="hidden">
                <div id="error" class="error">Cidade não encontrada. Tente novamente.</div>
                <div class="weather-actions" style="justify-content: center; margin-top: 15px;">
                    <button id="errorBackBtn" class="back-btn">← Voltar</button>
                </div>
            </div>
        </main>

        <footer>
            <p>Dados fornecidos por <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a></p>
        </footer>
    </div>

    <script type="module" src='./assets/js/api.js'></script>
</body>
</html>
